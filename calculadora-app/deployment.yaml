apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculadora-deployment
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculadora
  template:
    metadata:
      labels:
        app: calculadora
    spec:
      containers:
      - name: calculadora-app
        image: ahmetb/kubernetes-network-policy-recipes-colored-app:latest # Uma imagem visual e simples
        ports:
        - containerPort: 8080